[settings]
default_target_type = "automatic"

# Core: meta-package that pulls in always-deployed CLI tools
[core]
depends = ["fish", "git", "starship", "bat", "btop"]

# Individual core tools
[fish]
[fish.files]
"fish" = "~/.config/fish"

[git]
[git.files]
"git/gitconfig" = "~/.gitconfig"
[git.variables]
git_name = "Tony Fischer (tku137)"
git_email = "tku137@mailbox.org"

[starship]
[starship.files]
"starship/starship.toml" = "~/.config/starship.toml"

[bat]
[bat.files]
"bat" = "~/.config/bat"

[btop]
[btop.files]
"btop" = "~/.config/btop"

# Terminal: shared font variables (no files)
[terminal.variables]
font_family = "AtkynsonMono Nerd Font"
font_size = 16
font_family_italic = "Maple Mono NF"

# Editors
[nvim]
depends = ["mcphub"]

[nvim.files]
"nvim" = "~/.config/nvim"

[zed.files]
"zed" = "~/.config/zed"

# MCP Hub (pulled in by nvim)
[mcphub.files]
"mcphub" = "~/.config/mcphub"

# Terminal emulators
[ghostty]
depends = ["terminal"]

[ghostty.files]
"ghostty" = "~/.config/ghostty"

[wezterm]
depends = ["terminal"]

[wezterm.files]
"wezterm" = "~/.config/wezterm"

# Multiplexers
[tmux.files]
"tmux/tmux.conf" = "~/.config/tmux/tmux.conf"

[zellij.files]
"zellij" = "~/.config/zellij"

# macOS window manager
[amethyst.files]
"amethyst/amethyst.yml" = "~/.amethyst.yml"

# Reference only (not in any standard profile)
[alacritty]
depends = ["terminal"]

[alacritty.files]
"alacritty" = "~/.config/alacritty"

[hatch.files]
"hatch" = "~/.config/hatch"

[ipython.files]
"ipython/ipython_config.py" = "~/.ipython/profile_default/ipython_config.py"

[iterm2.files]
"iterm2/com.googlecode.iterm2.plist" = "~/.config/iterm2/com.googlecode.iterm2.plist"

[kitty]
depends = ["terminal"]

[kitty.files]
"kitty" = "~/.config/kitty"

[zsh.files]
"zsh/zshrc" = "~/.zshrc"
